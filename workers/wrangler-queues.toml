# Database Configuration
[[d1_databases]]
binding = "DB"
database_name = "newsletter-db-id"
database_id = "4d8f479a-069a-446d-9930-2e4bbf8dae77"

# R2 Storage Configuration
[[r2_buckets]]
binding = "IMAGES"
bucket_name = "blog-images"

[[r2_buckets]]
binding = "R2_ASSETS"
bucket_name = "newsletter-assets"

# KV Storage Configuration
[[kv_namespaces]]
binding = "CACHE"
id = "ca3f3cbafbbc42c38c93c6b62b854ba1"

# AI Binding Configuration
[ai]
binding = "AI"

# Queue Configuration
[[queues.producers]]
binding = "ARTICLE_QUEUE"
queue = "article-processing"

[[queues.producers]]
binding = "NEWSLETTER_QUEUE"
queue = "newsletter-generation"

[[queues.producers]]
binding = "EMAIL_QUEUE"
queue = "email-distribution"

[[queues.producers]]
binding = "IMAGE_QUEUE"
queue = "image-processing"

[[queues.producers]]
binding = "DEAD_LETTER_QUEUE"
queue = "dead-letter"

# Queue Consumers
[[queues.consumers]]
queue = "article-processing"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 3
dead_letter_queue = "dead-letter"

[[queues.consumers]]
queue = "newsletter-generation"
max_batch_size = 5
max_batch_timeout = 60
max_retries = 2
dead_letter_queue = "dead-letter"

[[queues.consumers]]
queue = "email-distribution"
max_batch_size = 20
max_batch_timeout = 15
max_retries = 3
dead_letter_queue = "dead-letter"

[[queues.consumers]]
queue = "image-processing"
max_batch_size = 15
max_batch_timeout = 45
max_retries = 2
dead_letter_queue = "dead-letter"

[[queues.consumers]]
queue = "dead-letter"
max_batch_size = 50
max_batch_timeout = 60
max_retries = 0

# Durable Objects Configuration
[[durable_objects.bindings]]
name = "JOB_STATE"
class_name = "JobState"
script_name = "containercode-queue-processor"

[[durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "RateLimiter"
script_name = "containercode-queue-processor"

[[durable_objects.bindings]]
name = "PIPELINE_ORCHESTRATOR"
class_name = "PipelineOrchestrator"
script_name = "containercode-queue-processor"

# Analytics Configuration
[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "queue_analytics"

# Cron Triggers for Maintenance
[[triggers]]
crons = ["0 2 * * *"]  # Daily cleanup at 2 AM

# Service Bindings
[[services]]
binding = "MAIN_WORKER"
service = "containercode"

# WebSocket Configuration for Real-time Monitoring
[websocket]
binding = "WEBSOCKET"

# Rate Limiting Configuration
[rate_limiting]
enabled = true
requests_per_minute = 1000
burst_size = 100

# Memory and CPU Limits
[placement]
mode = "smart"

# Build Configuration
[build]
command = "npm run build:workers"
watch_dir = "workers"

# Development Configuration
[dev]
ip = "127.0.0.1"
port = 8788
local_protocol = "http"
upstream_protocol = "https"

# Migrations (if needed)
[[migrations]]
tag = "v1"
new_classes = ["JobState", "RateLimiter", "PipelineOrchestrator"]