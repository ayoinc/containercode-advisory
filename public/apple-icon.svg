<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Professional gradient for icon -->
    <linearGradient id="professionalGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#334155;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle for better contrast -->
  <circle cx="100" cy="100" r="95" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  
  <!-- Professional Icon - Modern hexagon with internal structure -->
  <g transform="translate(100, 100)">
    <!-- Outer hexagon frame -->
    <path d="M -45 0 L -22.5 -39 L 22.5 -39 L 45 0 L 22.5 39 L -22.5 39 Z" 
          fill="url(#professionalGradient)" 
          stroke="#334155" 
          stroke-width="2"/>
    
    <!-- Inner geometric pattern representing containers/architecture -->
    <rect x="-30" y="-22" width="18" height="18" fill="#64748b" rx="3"/>
    <rect x="-6" y="-22" width="18" height="18" fill="#475569" rx="3"/>
    <rect x="18" y="-22" width="18" height="18" fill="#64748b" rx="3"/>
    
    <rect x="-30" y="0" width="18" height="18" fill="#475569" rx="3"/>
    <rect x="-6" y="0" width="18" height="18" fill="#334155" rx="3"/>
    <rect x="18" y="0" width="18" height="18" fill="#475569" rx="3"/>
    
    <rect x="-18" y="22" width="18" height="18" fill="#64748b" rx="3"/>
    <rect x="6" y="22" width="18" height="18" fill="#475569" rx="3"/>
    
    <!-- Connection lines showing integration -->
    <line x1="-21" y1="-13" x2="3" y2="-13" stroke="#94a3b8" stroke-width="2"/>
    <line x1="3" y1="-13" x2="27" y2="-13" stroke="#94a3b8" stroke-width="2"/>
    <line x1="-21" y1="9" x2="3" y2="9" stroke="#94a3b8" stroke-width="2"/>
    <line x1="3" y1="9" x2="27" y2="9" stroke="#94a3b8" stroke-width="2"/>
    <line x1="-9" y1="31" x2="15" y2="31" stroke="#94a3b8" stroke-width="2"/>
    
    <!-- Vertical connections -->
    <line x1="-21" y1="-4" x2="-21" y2="18" stroke="#94a3b8" stroke-width="2"/>
    <line x1="3" y1="-4" x2="3" y2="18" stroke="#94a3b8" stroke-width="2"/>
    <line x1="27" y1="-4" x2="15" y2="22" stroke="#94a3b8" stroke-width="2"/>
  </g>
</svg>