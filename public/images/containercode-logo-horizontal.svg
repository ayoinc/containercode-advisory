<svg width="300" height="60" viewBox="0 0 300 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Modern gradient using the primary colors -->
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8c6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0e9aa8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Icon Section -->
  <g transform="translate(30, 30)">
    <!-- Hexagon Icon -->
    <path d="M -12 0 L -6 -10.5 L 6 -10.5 L 12 0 L 6 10.5 L -6 10.5 Z" 
          fill="url(#logoGradient)" 
          stroke="#0e9aa8" 
          stroke-width="1"/>
    
    <!-- Inner pattern -->
    <rect x="-8" y="-6" width="4" height="4" fill="#374151" rx="1"/>
    <rect x="-2" y="-6" width="4" height="4" fill="#4b5563" rx="1"/>
    <rect x="4" y="-6" width="4" height="4" fill="#374151" rx="1"/>
    
    <rect x="-8" y="0" width="4" height="4" fill="#4b5563" rx="1"/>
    <rect x="-2" y="0" width="4" height="4" fill="#374151" rx="1"/>
    <rect x="4" y="0" width="4" height="4" fill="#4b5563" rx="1"/>
    
    <rect x="-5" y="6" width="4" height="4" fill="#374151" rx="1"/>
    <rect x="1" y="6" width="4" height="4" fill="#4b5563" rx="1"/>
  </g>
  
  <!-- Text Section -->
  <g transform="translate(65, 0)">
    <!-- ContainerCode -->
    <text x="0" y="28" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#374151">
      ContainerCode
    </text>
    
    <!-- Advisory -->
    <text x="0" y="45" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#6b7280">
      Advisory
    </text>
  </g>
</svg>