# Analytics database from container config
[[d1_databases]]
binding = "ANALYTICS_DB"
database_name = "containercode"
database_id = "ab29336d-2c61-4085-b43c-4335a489bbb9"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "blog-images"

# Rename this to avoid conflict with OpenNext's asset handling
