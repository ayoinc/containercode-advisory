name = "containercode-app"
main = "src/cloudflare/container-worker.js"
compatibility_date = "2025-01-16"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

# Observability
[observability]
enabled = true

# Performance settings from container config
[limits]
cpu_ms = 30000
memory_mb = 512

# Placement configuration for optimal performance
[placement]
mode = "smart"

# Container configuration
[[containers]]
class_name = "ContainerCodeApp"
image = "./Dockerfile"
max_instances = 10

# Durable Objects configuration (required for containers)
[durable_objects]
bindings = [
  { class_name = "ContainerCodeApp", name = "CONTAINER_CODE_APP" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ContainerCodeApp"]

[vars]
